[package]
name        = "vtracer_c"
version     = "0.1.0"
edition     = "2021"
description = "C ABI shim around the VTracer raster-to-SVG tracer for the UltraCanvas Vectorizer plugin."
license     = "MIT"
publish     = false

[lib]
name       = "vtracer_c"
crate-type = ["staticlib", "cdylib"]

[dependencies]
vtracer      = "=0.6.5"
visioncortex = "=0.8.10"

[profile.release]
opt-level     = 3
lto           = "thin"
codegen-units = 1
strip         = "symbols"
panic         = "abort"
