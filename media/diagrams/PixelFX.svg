<text class="th purple-t" x="640" y="651" text-anchor="middle" dominant-baseline="central">FileLoader — PNG / JPEG / WebP / TIFF decode</text>
<rect class="purple-sub" x="850" y="628" width="370" height="46" rx="6" stroke-width="0.5"/>
