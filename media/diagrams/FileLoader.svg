<svg width="100%" viewBox="0 0 680 612" role="img" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<title>FileLoader module overview</title>
<desc>FileLoader is a single C++ API for loading, saving, and converting files across image, audio, video, document, 3D model, and archive formats, with built-in security scanning, intelligent caching, and an extensible plugin architecture.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t{font-size:14px;font-weight:400}
.ts{font-size:12px;font-weight:400}
.th{font-size:14px;font-weight:500}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}
.c-gray text{fill:#2C2C2A}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.c-purple text{fill:#26215C}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}
.c-teal text{fill:#04342C}
.c-coral rect{fill:#FAECE7;stroke:#993C1D}
.c-coral text{fill:#4A1B0C}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
</defs>

<g class="c-gray">
<rect x="40" y="40" width="600" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="60" text-anchor="middle" dominant-baseline="central">FileLoader</text>
<text class="ts" x="340" y="76" text-anchor="middle" dominant-baseline="central">One unified C++ API for all file operations</text>
</g>
<line x1="340" y1="88" x2="340" y2="112" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="40" y="112" width="600" height="154" rx="12" stroke-width="0.5"/>
</g>
<text class="th" x="56" y="134" dominant-baseline="central" fill="#26215C">Core operations</text>
<text class="ts" x="624" y="134" text-anchor="end" dominant-baseline="central" fill="#3C3489">Load · save · convert</text>

<g class="c-purple"><rect x="56" y="150" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="125" y="165" text-anchor="middle" dominant-baseline="central">LoadFile</text><text class="ts" x="125" y="181" text-anchor="middle" dominant-baseline="central">Auto-detect decode</text></g>
<g class="c-purple"><rect x="204" y="150" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="273" y="165" text-anchor="middle" dominant-baseline="central">ConvertFile</text><text class="ts" x="273" y="181" text-anchor="middle" dominant-baseline="central">Format to format</text></g>
<g class="c-purple"><rect x="352" y="150" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="421" y="165" text-anchor="middle" dominant-baseline="central">LoadMultipleFiles</text><text class="ts" x="421" y="181" text-anchor="middle" dominant-baseline="central">Batch processing</text></g>
<g class="c-purple"><rect x="500" y="150" width="124" height="44" rx="8" stroke-width="0.5"/><text class="th" x="562" y="165" text-anchor="middle" dominant-baseline="central">RegisterPlugin</text><text class="ts" x="562" y="181" text-anchor="middle" dominant-baseline="central">Custom formats</text></g>

<g class="c-purple"><rect x="56" y="204" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="125" y="219" text-anchor="middle" dominant-baseline="central">ScanFileForThreats</text><text class="ts" x="125" y="235" text-anchor="middle" dominant-baseline="central">Malware check</text></g>
<g class="c-purple"><rect x="204" y="204" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="273" y="219" text-anchor="middle" dominant-baseline="central">SetCacheSize</text><text class="ts" x="273" y="235" text-anchor="middle" dominant-baseline="central">Memory tuning</text></g>
<g class="c-purple"><rect x="352" y="204" width="272" height="44" rx="8" stroke-width="0.5" stroke-dasharray="4 3"/><text class="ts" x="488" y="226" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Init · Shutdown lifecycle management</text></g>

<line x1="340" y1="266" x2="340" y2="290" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="40" y="290" width="600" height="110" rx="12" stroke-width="0.5"/>
<text class="th" x="56" y="310" dominant-baseline="central" fill="#04342C">Supported file format families</text>
<text class="ts" x="624" y="310" text-anchor="end" dominant-baseline="central" fill="#0F6E56">Extensible via plugins</text>
</g>
<g class="c-teal"><rect x="56" y="326" width="190" height="30" rx="6" stroke-width="0.5"/><text class="ts" x="151" y="341" text-anchor="middle" dominant-baseline="central">Images · PNG JPEG WebP HEIC</text></g>
<g class="c-teal"><rect x="258" y="326" width="190" height="30" rx="6" stroke-width="0.5"/><text class="ts" x="353" y="341" text-anchor="middle" dominant-baseline="central">Audio · MP3 FLAC WAV OGG ..</text></g>
<g class="c-teal"><rect x="460" y="326" width="164" height="30" rx="6" stroke-width="0.5"/><text class="ts" x="542" y="341" text-anchor="middle" dominant-baseline="central">Video · MP4 MKV WebM ..</text></g>
<g class="c-teal"><rect x="56" y="362" width="190" height="30" rx="6" stroke-width="0.5"/><text class="ts" x="151" y="377" text-anchor="middle" dominant-baseline="central">Documents · PDF DOC ODT.. </text></g>
<g class="c-teal"><rect x="258" y="362" width="190" height="30" rx="6" stroke-width="0.5"/><text class="ts" x="353" y="377" text-anchor="middle" dominant-baseline="central">3D · OBJ FBX GLTF STL ..</text></g>
<g class="c-teal"><rect x="460" y="362" width="164" height="30" rx="6" stroke-width="0.5"/><text class="ts" x="542" y="377" text-anchor="middle" dominant-baseline="central">Archives · ZIP RAR 7Z TAR</text></g>

<line x1="220" y1="400" x2="220" y2="440" class="arr" marker-end="url(#arrow)"/>
<line x1="460" y1="400" x2="460" y2="440" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="420" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">built-in</text>

<g class="c-coral"><rect x="40" y="440" width="290" height="56" rx="12" stroke-width="0.5"/><text class="th" x="185" y="460" text-anchor="middle" dominant-baseline="central">Security scanner</text><text class="ts" x="185" y="478" text-anchor="middle" dominant-baseline="central">Automatic malware · virus detection</text></g>
<g class="c-coral"><rect x="350" y="440" width="290" height="56" rx="12" stroke-width="0.5"/><text class="th" x="495" y="460" text-anchor="middle" dominant-baseline="central">Intelligent cache</text><text class="ts" x="495" y="478" text-anchor="middle" dominant-baseline="central">Smart memory · resource management</text></g>

<text class="ts" x="340" y="540" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Cross-platform · Windows · Linux · macOS — part of the UltraCanvas framework</text>
</svg>
