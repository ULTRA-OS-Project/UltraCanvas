<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 706" role="img" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
<title>UltraNet module overview</title>
<desc>UltraNet network module organised as peer capability blocks (API surface, core protocols, plugins, credentials) sitting on top of a shared third-party dependency layer.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.th{font-size:14px;font-weight:500}
.ts{font-size:12px;font-weight:400}
.blue-fill{fill:#E6F1FB;stroke:#185FA5}
.blue-t{fill:#0C447C}.blue-s{fill:#185FA5}
.teal-fill{fill:#E1F5EE;stroke:#0F6E56}
.teal-sub{fill:#9FE1CB;stroke:#0F6E56}
.teal-t{fill:#085041}.teal-s{fill:#0F6E56}
.coral-fill{fill:#FAECE7;stroke:#993C1D}
.coral-t{fill:#712B13}.coral-s{fill:#993C1D}
.amber-fill{fill:#FAEEDA;stroke:#854F0B}
.amber-t{fill:#633806}.amber-s{fill:#854F0B}
.purple-fill{fill:#EEEDFE;stroke:#534AB7}
.purple-sub{fill:#CECBF6;stroke:#534AB7}
.purple-t{fill:#3C3489}.purple-s{fill:#534AB7}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
</defs>

<rect class="blue-fill" x="40" y="30" width="600" height="56" rx="10" stroke-width="0.5"/>
<text class="th blue-t" x="340" y="52" text-anchor="middle" dominant-baseline="central">UltraNet_* API surface</text>
<text class="ts blue-s" x="340" y="70" text-anchor="middle" dominant-baseline="central">C-style entrypoints · opaque handles · sync + async · UltraNetResult</text>

<rect class="teal-fill" x="40" y="104" width="600" height="206" rx="10" stroke-width="0.5"/>
<text class="th teal-t" x="60" y="126" dominant-baseline="central">Core protocols</text>
<rect class="teal-sub" x="58" y="142" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th teal-t" x="149" y="160" text-anchor="middle" dominant-baseline="central">HTTP / HTTPS</text>
<text class="ts teal-s" x="149" y="178" text-anchor="middle" dominant-baseline="central">REST, streaming, download</text>
<rect class="teal-sub" x="249" y="142" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th teal-t" x="340" y="160" text-anchor="middle" dominant-baseline="central">WebSocket</text>
<text class="ts teal-s" x="340" y="178" text-anchor="middle" dominant-baseline="central">ws / wss real-time</text>
<rect class="teal-sub" x="440" y="142" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th teal-t" x="531" y="160" text-anchor="middle" dominant-baseline="central">FTP / FTPS / SFTP</text>
<text class="ts teal-s" x="531" y="178" text-anchor="middle" dominant-baseline="central">File transfer</text>
<rect class="teal-sub" x="58" y="200" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th teal-t" x="149" y="218" text-anchor="middle" dominant-baseline="central">TCP / UDP</text>
<text class="ts teal-s" x="149" y="236" text-anchor="middle" dominant-baseline="central">Raw transport sockets</text>
<rect class="teal-sub" x="249" y="200" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th teal-t" x="340" y="218" text-anchor="middle" dominant-baseline="central">TLS</text>
<text class="ts teal-s" x="340" y="236" text-anchor="middle" dominant-baseline="central">1.2 / 1.3 · custom CA</text>
<rect class="teal-sub" x="440" y="200" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th teal-t" x="531" y="218" text-anchor="middle" dominant-baseline="central">DNS</text>
<text class="ts teal-s" x="531" y="236" text-anchor="middle" dominant-baseline="central">A / AAAA / MX / SRV…</text>
<rect class="teal-sub" x="58" y="258" width="182" height="44" rx="6" stroke-width="0.5"/>
<text class="th teal-t" x="149" y="280" text-anchor="middle" dominant-baseline="central">Cookies / Sessions</text>
<rect class="teal-sub" x="249" y="258" width="182" height="44" rx="6" stroke-width="0.5"/>
<text class="th teal-t" x="340" y="280" text-anchor="middle" dominant-baseline="central">Proxy</text>
<rect class="teal-sub" x="440" y="258" width="182" height="44" rx="6" stroke-width="0.5"/>
<text class="th teal-t" x="531" y="280" text-anchor="middle" dominant-baseline="central">URL parse / build</text>

<rect class="coral-fill" x="40" y="328" width="430" height="118" rx="10" stroke-width="0.5"/>
<text class="th coral-t" x="60" y="350" dominant-baseline="central">Plugins</text>
<text class="ts coral-s" x="60" y="368" dominant-baseline="central">I&lt;Category&gt;ProtocolPlugin — core binary unchanged</text>
<text class="ts coral-s" x="60" y="392" dominant-baseline="central">SMTP · IMAP · POP3 · MQTT · gRPC · WebDAV</text>
<text class="ts coral-s" x="60" y="410" dominant-baseline="central">SSH · LDAP · Telnet · RTSP · RTMP · RTP</text>
<text class="ts coral-s" x="60" y="428" dominant-baseline="central">SIP · CoAP · mDNS · SNMP</text>

<rect class="amber-fill" x="486" y="328" width="154" height="118" rx="10" stroke-width="0.5"/>
<text class="th amber-t" x="563" y="350" text-anchor="middle" dominant-baseline="central">UltraVault</text>
<text class="ts amber-s" x="563" y="380" text-anchor="middle" dominant-baseline="central">Opt-in credential</text>
<text class="ts amber-s" x="563" y="398" text-anchor="middle" dominant-baseline="central">lookup — keys,</text>
<text class="ts amber-s" x="563" y="416" text-anchor="middle" dominant-baseline="central">certs, tokens</text>

<line x1="340" y1="446" x2="340" y2="486" class="arr" marker-end="url(#arrow)"/>

<rect class="purple-fill" x="40" y="488" width="600" height="190" rx="10" stroke-width="0.5"/>
<text class="th purple-t" x="60" y="510" dominant-baseline="central">Third-party dependencies</text>
<rect class="purple-sub" x="58" y="528" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th purple-t" x="149" y="546" text-anchor="middle" dominant-baseline="central">libcurl</text>
<text class="ts purple-s" x="149" y="564" text-anchor="middle" dominant-baseline="central">HTTP, FTP, WS, SMTP…</text>
<rect class="purple-sub" x="249" y="528" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th purple-t" x="340" y="546" text-anchor="middle" dominant-baseline="central">OpenSSL</text>
<text class="ts purple-s" x="340" y="564" text-anchor="middle" dominant-baseline="central">TLS, certs, crypto</text>
<rect class="purple-sub" x="440" y="528" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th purple-t" x="531" y="546" text-anchor="middle" dominant-baseline="central">c-ares / DNS lib</text>
<text class="ts purple-s" x="531" y="564" text-anchor="middle" dominant-baseline="central">Record-type resolution</text>
<rect class="purple-sub" x="58" y="586" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th purple-t" x="149" y="604" text-anchor="middle" dominant-baseline="central">libssh2 / libssh</text>
<text class="ts purple-s" x="149" y="622" text-anchor="middle" dominant-baseline="central">SFTP, SSH</text>
<rect class="purple-sub" x="249" y="586" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th purple-t" x="340" y="604" text-anchor="middle" dominant-baseline="central">Platform sockets</text>
<text class="ts purple-s" x="340" y="622" text-anchor="middle" dominant-baseline="central">BSD / Winsock · TCP/UDP</text>
<rect class="purple-sub" x="440" y="586" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th purple-t" x="531" y="604" text-anchor="middle" dominant-baseline="central">Protocol libs</text>
<text class="ts purple-s" x="531" y="622" text-anchor="middle" dominant-baseline="central">MQTT, gRPC, RTP…</text>
<text class="ts purple-s" x="60" y="658" dominant-baseline="central">Platform glue — Linux · macOS · Windows · ULTRA OS native</text>
</svg>
