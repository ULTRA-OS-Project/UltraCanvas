<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="14" viewBox="0 0 48 14">
  <defs>
    <linearGradient id="hGrip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#b9c2cc"/>
      <stop offset="0.5" stop-color="#e7ecf1"/>
      <stop offset="1"   stop-color="#b9c2cc"/>
    </linearGradient>
  </defs>
  <!-- Capsule body with fully rounded ends -->
  <rect x="1" y="1" width="46" height="12" rx="6" ry="6"
        fill="url(#hGrip)" stroke="#9aa6b2" stroke-width="1"/>
  <!-- Riffled grip lines in the middle -->
  <g stroke="#7f8b97" stroke-width="1" stroke-linecap="round">
    <line x1="21" y1="4" x2="21" y2="10"/>
    <line x1="24" y1="4" x2="24" y2="10"/>
    <line x1="27" y1="4" x2="27" y2="10"/>
  </g>
</svg>
