<svg width="100%" viewBox="0 0 680 612" role="img" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<title>VirtualFS module overview</title>
<desc>VirtualFS exposes one stable C++ public API that treats archives as virtual folders, routed by a singleton manager through self-registering format providers backed by swappable compression libraries.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t{font-size:14px;font-weight:400}
.ts{font-size:12px;font-weight:400}
.th{font-size:14px;font-weight:500}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}
.c-gray text{fill:#2C2C2A}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.c-purple text{fill:#26215C}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}
.c-teal text{fill:#04342C}
.c-coral rect{fill:#FAECE7;stroke:#993C1D}
.c-coral text{fill:#4A1B0C}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
</defs>

<g class="c-gray">
<rect x="40" y="40" width="600" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="60" text-anchor="middle" dominant-baseline="central">VirtualFS</text>
<text class="ts" x="340" y="76" text-anchor="middle" dominant-baseline="central">Browse archives as folders — transparent virtual file system</text>
</g>
<line x1="340" y1="88" x2="340" y2="112" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="40" y="112" width="600" height="208" rx="12" stroke-width="0.5"/>
</g>
<text class="th" x="56" y="134" dominant-baseline="central" fill="#26215C">VirtualFS public API</text>
<text class="ts" x="624" y="134" text-anchor="end" dominant-baseline="central" fill="#3C3489">VirtualFS_[Action]() · path-transparent</text>

<g class="c-purple"><rect x="56" y="150" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="125" y="165" text-anchor="middle" dominant-baseline="central">Path resolve</text><text class="ts" x="125" y="181" text-anchor="middle" dominant-baseline="central">Nested archive paths</text></g>
<g class="c-purple"><rect x="204" y="150" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="273" y="165" text-anchor="middle" dominant-baseline="central">List directory</text><text class="ts" x="273" y="181" text-anchor="middle" dominant-baseline="central">Filter, recurse, enum</text></g>
<g class="c-purple"><rect x="352" y="150" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="421" y="165" text-anchor="middle" dominant-baseline="central">Entry info</text><text class="ts" x="421" y="181" text-anchor="middle" dominant-baseline="central">Exists, type, size</text></g>
<g class="c-purple"><rect x="500" y="150" width="124" height="44" rx="8" stroke-width="0.5"/><text class="th" x="562" y="165" text-anchor="middle" dominant-baseline="central">Read file</text><text class="ts" x="562" y="181" text-anchor="middle" dominant-baseline="central">Full, partial, text</text></g>

<g class="c-purple"><rect x="56" y="204" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="125" y="219" text-anchor="middle" dominant-baseline="central">Stream</text><text class="ts" x="125" y="235" text-anchor="middle" dominant-baseline="central">Large-file, seek</text></g>
<g class="c-purple"><rect x="204" y="204" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="273" y="219" text-anchor="middle" dominant-baseline="central">Extract</text><text class="ts" x="273" y="235" text-anchor="middle" dominant-baseline="central">File, all, filtered</text></g>
<g class="c-purple"><rect x="352" y="204" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="421" y="219" text-anchor="middle" dominant-baseline="central">Create archive</text><text class="ts" x="421" y="235" text-anchor="middle" dominant-baseline="central">Write, compress</text></g>
<g class="c-purple"><rect x="500" y="204" width="124" height="44" rx="8" stroke-width="0.5"/><text class="th" x="562" y="219" text-anchor="middle" dominant-baseline="central">Password</text><text class="ts" x="562" y="235" text-anchor="middle" dominant-baseline="central">Encrypted archives</text></g>

<g class="c-purple"><rect x="56" y="258" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="125" y="273" text-anchor="middle" dominant-baseline="central">Mount</text><text class="ts" x="125" y="289" text-anchor="middle" dominant-baseline="central">Virtual mount points</text></g>
<g class="c-purple"><rect x="204" y="258" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="273" y="273" text-anchor="middle" dominant-baseline="central">Callbacks</text><text class="ts" x="273" y="289" text-anchor="middle" dominant-baseline="central">Progress, error</text></g>
<g class="c-purple"><rect x="352" y="258" width="272" height="44" rx="8" stroke-width="0.5" stroke-dasharray="4 3"/><text class="ts" x="488" y="280" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Regular files and archives handled the same</text></g>

<line x1="340" y1="320" x2="340" y2="344" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="40" y="344" width="600" height="56" rx="12" stroke-width="0.5"/>
<text class="th" x="340" y="364" text-anchor="middle" dominant-baseline="central">VirtualFSManager (singleton)</text>
<text class="ts" x="340" y="384" text-anchor="middle" dominant-baseline="central">Path parser · Provider registry · Cache manager · Mount table</text>
</g>
<line x1="340" y1="400" x2="340" y2="424" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="40" y="424" width="600" height="64" rx="12" stroke-width="0.5"/>
<text class="th" x="340" y="444" text-anchor="middle" dominant-baseline="central">Self-registering format providers · IVirtualFSProvider</text>
</g>
<g class="c-teal"><rect x="56" y="458" width="92" height="22" rx="6" stroke-width="0.5"/><text class="ts" x="102" y="469" text-anchor="middle" dominant-baseline="central">LocalFS</text></g>
<g class="c-teal"><rect x="160" y="458" width="92" height="22" rx="6" stroke-width="0.5"/><text class="ts" x="206" y="469" text-anchor="middle" dominant-baseline="central">ZIP</text></g>
<g class="c-teal"><rect x="264" y="458" width="92" height="22" rx="6" stroke-width="0.5"/><text class="ts" x="310" y="469" text-anchor="middle" dominant-baseline="central">7z</text></g>
<g class="c-teal"><rect x="368" y="458" width="92" height="22" rx="6" stroke-width="0.5"/><text class="ts" x="414" y="469" text-anchor="middle" dominant-baseline="central">TAR / GZ</text></g>
<g class="c-teal"><rect x="472" y="458" width="72" height="22" rx="6" stroke-width="0.5"/><text class="ts" x="508" y="469" text-anchor="middle" dominant-baseline="central">RAR</text></g>
<g class="c-teal"><rect x="556" y="458" width="68" height="22" rx="6" stroke-width="0.5"/><text class="ts" x="590" y="469" text-anchor="middle" dominant-baseline="central">ISO · …</text></g>

<line x1="340" y1="488" x2="340" y2="528" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="508" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">library-agnostic</text>

<g class="c-coral"><rect x="40" y="528" width="290" height="56" rx="12" stroke-width="0.5"/><text class="th" x="185" y="548" text-anchor="middle" dominant-baseline="central">libarchive</text><text class="ts" x="185" y="566" text-anchor="middle" dominant-baseline="central">ZIP · 7z · TAR · RAR · ISO · CAB</text></g>
<g class="c-coral"><rect x="350" y="528" width="290" height="56" rx="12" stroke-width="0.5"/><text class="th" x="495" y="548" text-anchor="middle" dominant-baseline="central">Compression codecs</text><text class="ts" x="495" y="566" text-anchor="middle" dominant-baseline="central">zlib · liblzma · lz4 · zstd</text></g>
</svg>
