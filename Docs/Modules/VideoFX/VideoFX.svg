<text class="th coral-t" x="340" y="326" text-anchor="middle" dominant-baseline="central">Color grading</text>
<text class="ts coral-s" x="340" y="344" text-anchor="middle" dominant-baseline="central">LUT, curves, HDR tone</text>
<rect class="coral-sub" x="440" y="308" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th coral-t" x="531" y="326" text-anchor="middle" dominant-baseline="central">Compositing</text>
<text class="ts coral-s" x="531" y="344" text-anchor="middle" dominant-baseline="central">Blend, alpha, layers</text>
<rect class="coral-sub" x="58" y="366" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th coral-t" x="149" y="384" text-anchor="middle" dominant-baseline="central">Filters</text>
<text class="ts coral-s" x="149" y="402" text-anchor="middle" dominant-baseline="central">Blur, sharpen, denoise</text>
<rect class="coral-sub" x="249" y="366" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th coral-t" x="340" y="384" text-anchor="middle" dominant-baseline="central">Transitions</text>
<text class="ts coral-s" x="340" y="402" text-anchor="middle" dominant-baseline="central">Fade, wipe, dissolve</text>
<rect class="coral-sub" x="440" y="366" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th coral-t" x="531" y="384" text-anchor="middle" dominant-baseline="central">Codecs</text>
<text class="ts coral-s" x="531" y="402" text-anchor="middle" dominant-baseline="central">H.264/265, AV1, VP9</text>
<text class="ts coral-s" x="60" y="436" dominant-baseline="central">IVideoFXEffectPlugin — core binary unchanged</text>
<text class="ts coral-s" x="60" y="458" dominant-baseline="central">Keying · Stabilize · Motion blur · Overlays / text · Particles · Audio FX</text>

<rect class="amber-fill" x="40" y="494" width="600" height="60" rx="10" stroke-width="0.5"/>
<text class="th amber-t" x="60" y="516" dominant-baseline="central">GPU acceleration</text>
<text class="ts amber-s" x="60" y="536" dominant-baseline="central">Vulkan · Metal · D3D12 compute · CUDA / NVENC · VA-API · QuickSync — CPU fallback</text>

<line x1="340" y1="554" x2="340" y2="594" class="arr" marker-end="url(#arrow)"/>

<rect class="purple-fill" x="40" y="596" width="600" height="190" rx="10" stroke-width="0.5"/>
<text class="th purple-t" x="60" y="618" dominant-baseline="central">Third-party dependencies</text>
