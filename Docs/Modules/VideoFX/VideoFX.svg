<text class="th purple-t" x="149" y="654" text-anchor="middle" dominant-baseline="central">FFmpeg / libav</text>
<text class="ts purple-s" x="149" y="672" text-anchor="middle" dominant-baseline="central">Demux, decode, encode</text>
<rect class="purple-sub" x="249" y="636" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th purple-t" x="340" y="654" text-anchor="middle" dominant-baseline="central">libvpx / dav1d</text>
<text class="ts purple-s" x="340" y="672" text-anchor="middle" dominant-baseline="central">VP9 · AV1 codecs</text>
<rect class="purple-sub" x="440" y="636" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th purple-t" x="531" y="654" text-anchor="middle" dominant-baseline="central">x264 / x265</text>
<text class="ts purple-s" x="531" y="672" text-anchor="middle" dominant-baseline="central">H.264 · H.265 encode</text>
<rect class="purple-sub" x="58" y="694" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th purple-t" x="149" y="712" text-anchor="middle" dominant-baseline="central">Vulkan / Metal SDK</text>
<text class="ts purple-s" x="149" y="730" text-anchor="middle" dominant-baseline="central">GPU compute shaders</text>
<rect class="purple-sub" x="249" y="694" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th purple-t" x="340" y="712" text-anchor="middle" dominant-baseline="central">zimg / libplacebo</text>
<text class="ts purple-s" x="340" y="730" text-anchor="middle" dominant-baseline="central">Scaling · color · HDR</text>
<rect class="purple-sub" x="440" y="694" width="182" height="50" rx="6" stroke-width="0.5"/>
<text class="th purple-t" x="531" y="712" text-anchor="middle" dominant-baseline="central">Cairo / UltraCanvas</text>
<text class="ts purple-s" x="531" y="730" text-anchor="middle" dominant-baseline="central">Overlay raster · preview</text>
<text class="ts purple-s" x="60" y="766" dominant-baseline="central">Platform glue — Linux · macOS · Windows · ULTRA OS native</text>
</svg>
