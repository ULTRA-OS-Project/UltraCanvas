<svg width="100%" viewBox="0 0 680 532" role="img" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<title>UltraAI module overview</title>
<desc>UltraAI exposes ten stable C++ capability interfaces backed by swappable, self-registering adapter APIs, which optionally route through UltraNet for networking and UltraVault for credentials.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t{font-size:14px;font-weight:400}
.ts{font-size:12px;font-weight:400}
.th{font-size:14px;font-weight:500}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}
.c-gray text{fill:#2C2C2A}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.c-purple text{fill:#26215C}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}
.c-teal text{fill:#04342C}
.c-coral rect{fill:#FAECE7;stroke:#993C1D}
.c-coral text{fill:#4A1B0C}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
</defs>

<g class="c-gray">
<rect x="40" y="40" width="600" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="60" text-anchor="middle" dominant-baseline="central">UltraAI</text>
<text class="ts" x="340" y="76" text-anchor="middle" dominant-baseline="central">Single stable C++ surface for AI features</text>
</g>
<line x1="340" y1="88" x2="340" y2="112" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="40" y="112" width="600" height="208" rx="12" stroke-width="0.5"/>
</g>
<text class="th" x="56" y="134" dominant-baseline="central" fill="#26215C">UltraAI API capabilities</text>
<text class="ts" x="624" y="134" text-anchor="end" dominant-baseline="central" fill="#3C3489">10 modalities · mock adapter each</text>

<g class="c-purple"><rect x="56" y="150" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="125" y="165" text-anchor="middle" dominant-baseline="central">ITextLLM</text><text class="ts" x="125" y="181" text-anchor="middle" dominant-baseline="central">Chat, tools, stream</text></g>
<g class="c-purple"><rect x="204" y="150" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="273" y="165" text-anchor="middle" dominant-baseline="central">IEmbeddings</text><text class="ts" x="273" y="181" text-anchor="middle" dominant-baseline="central">Batched vectors</text></g>
<g class="c-purple"><rect x="352" y="150" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="421" y="165" text-anchor="middle" dominant-baseline="central">ISpeechToText</text><text class="ts" x="421" y="181" text-anchor="middle" dominant-baseline="central">Transcribe, live mic</text></g>
<g class="c-purple"><rect x="500" y="150" width="124" height="44" rx="8" stroke-width="0.5"/><text class="th" x="562" y="165" text-anchor="middle" dominant-baseline="central">ITextToSpeech</text><text class="ts" x="562" y="181" text-anchor="middle" dominant-baseline="central">Synthesis, clone</text></g>

<g class="c-purple"><rect x="56" y="204" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="125" y="219" text-anchor="middle" dominant-baseline="central">IImageGen</text><text class="ts" x="125" y="235" text-anchor="middle" dominant-baseline="central">txt2img, inpaint</text></g>
<g class="c-purple"><rect x="204" y="204" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="273" y="219" text-anchor="middle" dominant-baseline="central">IVisionAnalyzer</text><text class="ts" x="273" y="235" text-anchor="middle" dominant-baseline="central">Caption, OCR, VQA</text></g>
<g class="c-purple"><rect x="352" y="204" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="421" y="219" text-anchor="middle" dominant-baseline="central">ITranslator</text><text class="ts" x="421" y="235" text-anchor="middle" dominant-baseline="central">Auto-detect, glossary</text></g>
<g class="c-purple"><rect x="500" y="204" width="124" height="44" rx="8" stroke-width="0.5"/><text class="th" x="562" y="219" text-anchor="middle" dominant-baseline="central">IVideoGen</text><text class="ts" x="562" y="235" text-anchor="middle" dominant-baseline="central">txt2vid, upscale</text></g>

<g class="c-purple"><rect x="56" y="258" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="125" y="273" text-anchor="middle" dominant-baseline="central">IMusicGen</text><text class="ts" x="125" y="289" text-anchor="middle" dominant-baseline="central">Song, SFX, stems</text></g>
<g class="c-purple"><rect x="204" y="258" width="138" height="44" rx="8" stroke-width="0.5"/><text class="th" x="273" y="273" text-anchor="middle" dominant-baseline="central">ICodeAssist</text><text class="ts" x="273" y="289" text-anchor="middle" dominant-baseline="central">Refactor, bugs, FIM</text></g>
<g class="c-purple"><rect x="352" y="258" width="272" height="44" rx="8" stroke-width="0.5" stroke-dasharray="4 3"/><text class="ts" x="488" y="280" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Each interface ships a programmable mock</text></g>

<line x1="340" y1="320" x2="340" y2="344" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="40" y="344" width="600" height="64" rx="12" stroke-width="0.5"/>
<text class="th" x="340" y="364" text-anchor="middle" dominant-baseline="central">Self-registering adapters</text>
</g>
<g class="c-teal"><rect x="60" y="378" width="124" height="22" rx="6" stroke-width="0.5"/><text class="ts" x="122" y="389" text-anchor="middle" dominant-baseline="central">Mock API</text></g>
<g class="c-teal"><rect x="196" y="378" width="124" height="22" rx="6" stroke-width="0.5"/><text class="ts" x="258" y="389" text-anchor="middle" dominant-baseline="central">Anthropic API</text></g>
<g class="c-teal"><rect x="332" y="378" width="124" height="22" rx="6" stroke-width="0.5"/><text class="ts" x="394" y="389" text-anchor="middle" dominant-baseline="central">OpenAI API</text></g>
<g class="c-teal"><rect x="468" y="378" width="156" height="22" rx="6" stroke-width="0.5"/><text class="ts" x="546" y="389" text-anchor="middle" dominant-baseline="central">Local Llama API · …</text></g>

<line x1="220" y1="408" x2="220" y2="448" class="arr" marker-end="url(#arrow)"/>
<line x1="460" y1="408" x2="460" y2="448" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="428" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">opt-in</text>

<g class="c-coral"><rect x="40" y="448" width="290" height="56" rx="12" stroke-width="0.5"/><text class="th" x="185" y="468" text-anchor="middle" dominant-baseline="central">UltraNet</text><text class="ts" x="185" y="486" text-anchor="middle" dominant-baseline="central">HTTP · WebSocket · TLS · DNS</text></g>
<g class="c-coral"><rect x="350" y="448" width="290" height="56" rx="12" stroke-width="0.5"/><text class="th" x="495" y="468" text-anchor="middle" dominant-baseline="central">UltraVault</text><text class="ts" x="495" y="486" text-anchor="middle" dominant-baseline="central">Named-secret resolution</text></g>
</svg>
