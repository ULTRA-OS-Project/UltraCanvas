<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" width="820" height="340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6470"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="340" fill="#ffffff"/>

  <!-- App -->
  <rect x="28" y="118" width="138" height="68" rx="10" fill="#e8f0fe" stroke="#4169e1" stroke-width="2"/>
  <text x="97" y="158" text-anchor="middle" font-size="20" font-weight="bold" fill="#1f3a8a">App</text>

  <!-- Capability interface -->
  <rect x="262" y="34" width="300" height="64" rx="10" fill="#e6f7f4" stroke="#1aa085" stroke-width="2"/>
  <text x="412" y="62" text-anchor="middle" font-size="16" font-weight="bold" fill="#0c6b58">UltraAI::I&lt;Capability&gt;</text>
  <text x="412" y="83" text-anchor="middle" font-size="12" fill="#3a3a3a">stable C++ interface</text>

  <!-- Adapter -->
  <rect x="262" y="138" width="300" height="64" rx="10" fill="#f0e9fb" stroke="#7c4dcc" stroke-width="2"/>
  <text x="412" y="166" text-anchor="middle" font-size="16" font-weight="bold" fill="#5a2ea6">Adapter</text>
  <text x="412" y="187" text-anchor="middle" font-size="12" fill="#3a3a3a">mock | anthropic | openai | local-llama | …</text>

  <!-- UltraNet -->
  <rect x="612" y="120" width="178" height="56" rx="10" fill="#f1f3f5" stroke="#5b6470" stroke-width="2"/>
  <text x="701" y="144" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">UltraNet</text>
  <text x="701" y="163" text-anchor="middle" font-size="11" fill="#555">HTTP · WS · TLS · DNS  [opt-in]</text>

  <!-- UltraVault -->
  <rect x="612" y="192" width="178" height="56" rx="10" fill="#f1f3f5" stroke="#5b6470" stroke-width="2"/>
  <text x="701" y="216" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">UltraVault</text>
  <text x="701" y="235" text-anchor="middle" font-size="11" fill="#555">named-secret resolution  [opt-in]</text>

  <!-- UltraCanvas -->
  <rect x="262" y="252" width="300" height="56" rx="10" fill="#eaf7ea" stroke="#2e9e44" stroke-width="2"/>
  <text x="412" y="276" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d6e2c">UltraCanvas</text>
  <text x="412" y="295" text-anchor="middle" font-size="12" fill="#3a3a3a">UI widgets</text>

  <!-- Arrows -->
  <!-- App -> Capability -->
  <path d="M166,140 C210,120 220,80 256,70" fill="none" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- App -> UltraCanvas -->
  <path d="M166,164 C210,200 220,260 256,278" fill="none" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Capability -> Adapter -->
  <path d="M412,98 L412,132" fill="none" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Adapter -> UltraNet -->
  <path d="M562,160 C590,156 590,150 606,148" fill="none" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Adapter -> UltraVault -->
  <path d="M562,182 C590,196 590,212 606,218" fill="none" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
