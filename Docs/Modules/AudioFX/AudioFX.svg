<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 862" role="img" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
<title>AudioFX module overview</title>
<desc>AudioFX audio engine organised as the AudioFX_* API surface, operation categories, plugin extension and credential layer, sitting on top of a shared third-party dependency layer.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.th{font-size:14px;font-weight:500}
.ts{font-size:12px;font-weight:400}
.blue-fill{fill:#E6F1FB;stroke:#185FA5}
.blue-t{fill:#0C447C}.blue-s{fill:#185FA5}
.teal-fill{fill:#E1F5EE;stroke:#0F6E56}
.teal-sub{fill:#9FE1CB;stroke:#0F6E56}
.teal-t{fill:#085041}.teal-s{fill:#0F6E56}
