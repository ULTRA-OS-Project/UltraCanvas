name: Build

on:
  push:
    # 'claude/**' lets feature branches validate the 3-OS build before merge;
    # tighten or drop once the OpenGL work has landed on main.
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # NOTE: macos-13 is the last GitHub-hosted Intel (x86_64) macOS runner.
        # When GitHub deprecates it, options are: drop Intel builds, use
        # self-hosted runners, or cross-compile universal binaries.
        os: [macos-latest, ubuntu-latest, windows-latest]
        build_type: [Release]
        include:
          - os: macos-latest
            arch_label: arm64
            install_deps: |
              brew install cmake pkg-config
              brew install cairo pango harfbuzz vips glib freetype tinyxml2
              brew install jsoncpp
              brew install libcdr librevenge
              brew install zbar
              brew install mupdf
              brew install c-ares
              # libcurl: use Apple's system libcurl (SecureTransport-family
              # backend) — already present on every macOS install, so we add
              # no extra dependency for UltraNet on this platform.
          - os: ubuntu-latest
            arch_label: x86_64
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y cmake pkg-config build-essential
              sudo apt-get install -y libcairo2-dev libpango1.0-dev libharfbuzz-dev
              sudo apt-get install -y libvips-dev libglib2.0-dev libfreetype6-dev
              sudo apt-get install -y libtinyxml2-dev libjsoncpp-dev libfmt-dev
              sudo apt-get install -y libx11-dev libxcursor-dev libgl1-mesa-dev libgtk-3-dev
              sudo apt-get install -y libcdr-dev librevenge-dev zlib1g-dev
              sudo apt-get install -y libzbar-dev libmupdf-dev
              # MuPDF third-party deps: Ubuntu's libmupdf.a is built with
              # USE_SYSTEM_LIBS and ships no libmupdf-third, so jbig2dec/mujs/gumbo
              # must be linked from system -dev packages (find_library needs the .so).
              sudo apt-get install -y libjbig2dec0-dev libmujs-dev libgumbo-dev libopenjp2-7-dev
              sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
              sudo apt-get install -y libcurl4-openssl-dev
              sudo apt-get install -y libc-ares-dev
          - os: windows-latest
            arch_label: x86_64

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract version from changelog
        shell: bash
        run: |
          VERSION=$(sed -nE '1s/^#### [0-9-]+ \*([0-9]+\.[0-9]+\.[0-9]+)\*.*/\1/p' Docs/UltraCanvas/CHANGELOG.md)
          if [ -z "$VERSION" ]; then
            echo "Error: could not parse version from Docs/UltraCanvas/CHANGELOG.md (expected '#### YYYY-MM-DD *x.y.z*')" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # ===== Windows: MSYS2/MinGW dependency management =====
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-cairo
            mingw-w64-x86_64-pango
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-tinyxml2
            mingw-w64-x86_64-jsoncpp
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libvips
            mingw-w64-x86_64-glew
            mingw-w64-x86_64-fmt
            mingw-w64-x86_64-imagemagick
            mingw-w64-x86_64-libheif
            mingw-w64-x86_64-zbar
            mingw-w64-x86_64-mupdf
            mingw-w64-x86_64-libmupdf
            mingw-w64-x86_64-curl-winssl
            mingw-w64-x86_64-c-ares
            zip
            
      # ===== macOS / Linux: system package manager =====
      - name: Install dependencies (macOS/Linux)
        if: runner.os != 'Windows'
        run: ${{ matrix.install_deps }}

      # ===== Python `websockets` for UltraNet WS loopback test =====
      # Cheap to install; the test SKIPs cleanly if missing, but enabling
      # it lets the receiver-thread / frame-handling paths actually run
      # in CI (where libcurl has WS support).
      - name: Install python websockets package
        run: pip3 install --user --break-system-packages websockets || pip3 install --user websockets

      # ===== Configure & Build =====
      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_DEMO_APP=ON \
            -DULTRACANVAS_PLUGIN_CDR=OFF \
            -DULTRACANVAS_PLUGIN_XAR=ON \
            -DULTRACANVAS_BUILD_NET_TESTS=ON 2>&1 | tee configure.log

      - name: Configure CMake (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_DEMO_APP=ON \
            -DULTRACANVAS_PLUGIN_CDR=ON \
            -DULTRACANVAS_PLUGIN_XAR=ON \
            -DULTRACANVAS_BUILD_NET_TESTS=ON 2>&1 | tee configure.log

      # Fail loudly if the OpenGL surface backend was silently disabled
      # (e.g. a missing GLEW on Windows) so a green build can't hide it.
      - name: Verify OpenGL backend enabled
        shell: bash
        run: |
          set -eu
          if ! grep -q "OpenGL Surface: ENABLED" configure.log; then
            echo "::error::OpenGL surface support was not enabled during configure"
            exit 1
          fi
          case "${{ runner.os }}" in
            Windows) backend="WGL" ;;
            macOS)   backend="CGL" ;;
            Linux)   backend="EGL|GLX" ;;
          esac
          if ! grep -qE "($backend) backend: YES" configure.log; then
            echo "::error::Expected GL backend ($backend) not active on ${{ runner.os }}"
            exit 1
          fi
          echo "OpenGL backend verified on ${{ runner.os }}"

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel 2

      - name: Run UltraNet tests
        if: runner.os != 'Windows'
        working-directory: build
        run: ctest --output-on-failure -R UltraNet

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: ./package-win.sh --no-sign

      - name: Import code signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Decode base64 .p12 from the secret
          echo "$MACOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12

          # Create + unlock a temporary keychain (avoids touching the runner's login keychain)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/build.keychain
          security set-keychain-settings -lut 21600 $RUNNER_TEMP/build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/build.keychain

          # Import the cert and grant codesign access without UI prompts
          security import $RUNNER_TEMP/certificate.p12 \
            -k $RUNNER_TEMP/build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/build.keychain

          # Make the temp keychain searchable for codesign (prepend to existing search list)
          security list-keychains -d user -s $RUNNER_TEMP/build.keychain $(security list-keychains -d user | sed s/\"//g)

          rm $RUNNER_TEMP/certificate.p12

      - name: Package (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_SIGN_ID: ${{ secrets.APPLE_SIGN_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: ./package-macos.sh --notarize

      - name: Cleanup keychain (macOS)
        if: always() && runner.os == 'macOS'
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain || true

      - name: Upload build artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: UCDemo-Windows-${{ env.VERSION }}-${{ matrix.arch_label }}
          path: |
            dist/
          retention-days: 7

      - name: Upload build artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: UCDemo-MacOS-${{ env.VERSION }}-${{ matrix.arch_label }}
          path: |
            dist-macos/
          retention-days: 7

      - name: Upload build artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: UCDemo-Linux-${{ env.VERSION }}-${{ matrix.arch_label }}
          path: |
            build/lib/
            build/bin/
            build/share/
          retention-days: 7
