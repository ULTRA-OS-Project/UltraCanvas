# master_dependencies.yaml
# Authoritative dependency manifest for ULTRA OS / UltraCanvas modules.
# Section structure follows the "core / advanced" two-tier convention.
# This file is consumed by package-scripts, CI, and module integrators.
# Version: 0.1.0
# Author: UltraCanvas Framework / ULTRA OS

# ===== NETWORK COMMUNICATION (UltraNet) =====
#
# TLS backend strategy: UltraNet uses whichever TLS backend libcurl was built
# against; we never call OpenSSL directly. To minimise impact on existing
# platforms we prefer the OS-native backend wherever it is shipped by default:
#
#   Linux   -> libcurl built against OpenSSL  (system default on Debian/Ubuntu)
#   Windows -> libcurl built against Schannel (no extra DLL — uses Win32 crypto)
#   macOS   -> Apple's system libcurl         (SecureTransport family backend)
#
# This means OpenSSL is only an explicit dependency on Linux; Windows and
# macOS pull TLS, the certificate trust store, and the cipher policy from
# the OS itself.
networking:
  core:
    libcurl:
      min_version: "7.86"             # 7.86 ships the curl_ws_* API
      purpose: "HTTP/HTTPS, FTP/FTPS, WebSocket transport (Tier 1 core)"
      required: true
      platforms: ["all"]
      cmake_module: "CURL"
      pkg_config: "libcurl"
      apt: "libcurl4-openssl-dev"      # OpenSSL backend
      vcpkg: "curl[schannel,websockets]"     # Schannel + WS on Windows
      brew: "(system)"                 # Apple ships libcurl with macOS
      msys2: "mingw-w64-x86_64-curl-winssl"  # Schannel-flavoured MinGW build
      # WebSocket support requires libcurl built with --enable-websockets.
      # UltraNet_WebSocketConnect detects this at runtime; if the linked
      # libcurl doesn't list ws/wss in Protocols, it returns InvalidHandle
      # with a clear error explaining how to fix the build.
      # Distro packages vary: Ubuntu 24.04's libcurl4-openssl-dev 8.5 ships
      # WITHOUT WS; vcpkg's curl[websockets] explicitly opts in.

    openssl:
      min_version: "1.1.1"
      purpose: "TLS 1.2/1.3 backend for libcurl on Linux"
      required: true
      platforms: ["Linux"]
      cmake_module: "OpenSSL"
      pkg_config: "openssl"
      apt: "libssl-dev"
      # No vcpkg/brew entry: Windows uses Schannel, macOS uses the
      # SecureTransport-family backend in Apple's system libcurl.

    libssh2:
      min_version: "1.10"
      purpose: "SFTP / SSH file transfer support (Stage 3)"
      required: true
      platforms: ["all"]
      cmake_module: "Libssh2"
      pkg_config: "libssh2"
      apt: "libssh2-1-dev"
      vcpkg: "libssh2"
      brew: "libssh2"

    c-ares:
      min_version: "1.17"
      purpose: "Async DNS resolution (non-blocking) (Stage 2)"
      required: true
      platforms: ["all"]
      cmake_module: "c-ares"
      pkg_config: "libcares"
      apt: "libc-ares-dev"
      vcpkg: "c-ares"
      brew: "c-ares"

  advanced:
    libwebsockets:
      min_version: "4.3"
      purpose: "Lightweight WebSocket server / advanced WS scenarios"
      required: false
      priority: "medium"
      platforms: ["all"]
      pkg_config: "libwebsockets"
      apt: "libwebsockets-dev"

    nghttp2:
      min_version: "1.40"
      purpose: "HTTP/2 multiplexing acceleration"
      required: false
      priority: "high"
      platforms: ["all"]
      pkg_config: "libnghttp2"
      apt: "libnghttp2-dev"

    nghttp3:
      purpose: "HTTP/3 (QUIC) support - future"
      required: false
      priority: "low"
      platforms: ["all"]

    paho-mqtt:
      min_version: "1.3"
      purpose: "MQTT plugin (IoT messaging) - Tier 2 plugin"
      required: false
      priority: "medium"
      platforms: ["all"]
      cmake_module: "PahoMqttC"
      apt: "libpaho-mqtt-dev"

    libssh:
      min_version: "0.9"
      purpose: "Interactive SSH / shell plugin - Tier 3 plugin"
      required: false
      priority: "low"
      platforms: ["all"]
      pkg_config: "libssh"
      apt: "libssh-dev"

    avahi:
      min_version: "0.8"
      purpose: "mDNS / Zeroconf service discovery (Linux) - Tier 2 plugin"
      required: false
      priority: "low"
      platforms: ["Linux"]
      pkg_config: "avahi-client"
      apt: "libavahi-client-dev"

    openldap:
      min_version: "2.4"
      purpose: "LDAP / LDAPS plugin - Tier 3 plugin"
      required: false
      priority: "low"
      platforms: ["all"]
      apt: "libldap2-dev"

# ===== AUDIO (UltraCanvas Audio) =====
#
# Audio codec strategy: the core backend is miniaudio, a single-header,
# public-domain (MIT-0) library vendored in-tree at
# UltraCanvas/libspecific/Audio/miniaudio.h. It supplies device enumeration,
# playback/capture streams, WAV encode, and WAV/MP3/FLAC decode via its bundled
# dr_wav/dr_mp3/dr_flac decoders. Because it is vendored, the core tier needs no
# system package — it is enabled by the ULTRACANVAS_ENABLE_AUDIO CMake option.
#
# OGG (Vorbis) and Opus are NOT part of miniaudio's bundled set. They are added
# in the advanced tier:
#   - Vorbis decode: vendor stb_vorbis (public domain), which auto-enables
#     miniaudio's MA_HAS_VORBIS decode path with no system dependency.
#   - Opus decode / Vorbis+Opus encode: link the Xiph libraries below.
audio:
  core:
    miniaudio:
      min_version: "0.11.21"
      purpose: "Audio device I/O + WAV/MP3/FLAC decode, WAV encode (Tier 1 core)"
      required: true
      platforms: ["all"]
      vendored: "UltraCanvas/libspecific/Audio/miniaudio.h"  # single-header, no system package
      apt: "(vendored)"
      vcpkg: "(vendored)"
      brew: "(vendored)"
      # Links dl + pthread + m on Linux; AudioToolbox/CoreAudio/CoreFoundation
      # on macOS; the already-linked Win32 SDK on Windows.

  advanced:
    stb_vorbis:
      purpose: "OGG Vorbis decode (auto-enables miniaudio MA_HAS_VORBIS)"
      required: false
      priority: "high"
      platforms: ["all"]
      vendored: "UltraCanvas/third_party/stb_vorbis"  # public domain, planned vendor
      apt: "(vendored)"

    libvorbis:
      min_version: "1.3.6"
      purpose: "OGG Vorbis encode (libvorbisenc); optional decode via vorbisfile"
      required: false
      priority: "medium"
      platforms: ["all"]
      pkg_config: "vorbisenc vorbisfile vorbis"
      apt: "libvorbis-dev"
      vcpkg: "libvorbis"
      brew: "libvorbis"

    libogg:
      min_version: "1.3.4"
      purpose: "Ogg container framing (transitive dep of libvorbis / opusfile)"
      required: false
      priority: "medium"
      platforms: ["all"]
      pkg_config: "ogg"
      apt: "libogg-dev"
      vcpkg: "libogg"
      brew: "libogg"

    opus:
      min_version: "1.3"
      purpose: "Opus decode/encode (opusfile + opusenc, Ogg-encapsulated Opus)"
      required: false
      priority: "low"
      platforms: ["all"]
      pkg_config: "opusfile opus"
      apt: "libopusfile-dev libopus-dev"
      vcpkg: "opusfile opus"
      brew: "opusfile opus"
